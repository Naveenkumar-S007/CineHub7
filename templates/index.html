<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CineHub | Discover Movies</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <script defer src="{{ url_for('static', filename='face-api.min.js') }}"></script>

    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#ff4b2b">
</head>

<body class="home-cinematic">

<!-- NAVBAR -->
<nav class="navbar">
    <div class="brand">🎬 CineHub</div>
</nav>

<!-- HERO -->
<section class="hero-section">

    <h1>Find Movies Based on Your Mood 🎭</h1>

    <!-- TEXT INPUT -->
    <form action="/recommend" method="POST">
        <input type="text" name="emotion" placeholder="How are you feeling?" required>
        <button type="submit">Search</button>
    </form>

    <!-- CAMERA -->
    <div class="camera-card" onclick="startCamera(event)">
        <video id="cameraFeed" autoplay playsinline></video>
        <canvas id="overlayCanvas"></canvas>

        <p>Click to start AI Face Detection</p>
    </div>

</section>

<script>

let video, canvas, ctx;
let modelLoaded = false;
let detecting = false;

// =========================
// LOAD MODELS
// =========================
window.onload = async () => {
    video = document.getElementById('cameraFeed');
    canvas = document.getElementById('overlayCanvas');
    ctx = canvas.getContext('2d');

    try {
        await Promise.all([
            faceapi.nets.tinyFaceDetector.loadFromUri('/static/models'),
            faceapi.nets.faceExpressionNet.loadFromUri('/static/models')
        ]);

        modelLoaded = true;
        console.log("Models Loaded");

    } catch (err) {
        console.error("Model load error:", err);
        alert("Failed to load AI models");
    }
};

// =========================
// START CAMERA
// =========================
async function startCamera(event) {
    if (event) event.preventDefault();

    const stream = await navigator.mediaDevices.getUserMedia({ video: true });

    video.srcObject = stream;

    video.onloadedmetadata = () => {
        video.play();

        setTimeout(() => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            if (!modelLoaded) {
                alert("AI model still loading...");
                return;
            }

            detecting = true;
            detectFace();

        }, 500);
    };
}

// =========================
// FACE DETECTION LOOP
// =========================
async function detectFace() {
    if (!detecting) return;

    const detections = await faceapi
        .detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
        .withFaceExpressions();

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    detections.forEach(det => {

        const box = det.detection.box;

        ctx.strokeStyle = "lime";
        ctx.lineWidth = 2;
        ctx.strokeRect(box.x, box.y, box.width, box.height);

        // SAFE emotion detection
        let emotion = "neutral";
        let max = 0;

        Object.keys(det.expressions).forEach(key => {
            if (det.expressions[key] > max) {
                max = det.expressions[key];
                emotion = key;
            }
        });

        ctx.fillStyle = "yellow";
        ctx.font = "16px Poppins";
        ctx.fillText(emotion, box.x, box.y - 10);

        // SEND TO FLASK ONLY ONCE
        if (detecting) {
            detecting = false;

            setTimeout(() => {
                const form = document.createElement("form");
                form.method = "POST";
                form.action = "/recommend";

                const input = document.createElement("input");
                input.type = "hidden";
                input.name = "emotion";
                input.value = emotion;

                form.appendChild(input);
                document.body.appendChild(form);
                form.submit();
            }, 400);
        }
    });

    requestAnimationFrame(detectFace);
}

// =========================
// SERVICE WORKER
// =========================
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/static/service-worker.js")
        .then(() => console.log("SW Registered"));
}

</script>

</body>
</html>
